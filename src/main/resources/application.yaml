spring:
  application:
    name: user-management
  datasource:
    url: jdbc:mysql://localhost:3306/user_management
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password:
  main:
    allow-bean-definition-overriding: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  mvc:
    throw-exception-if-no-handler-found: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
    outOfOrder: false
  mail:
    host: ${SPRING_MAIL_HOST:email-smtp.us-east-1.amazonaws.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SES_SMTP_USERNAME:}
    password: ${SES_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

security:
  jwt:
    # NOTE: Replace this with a strong value via environment-specific config before production use.
    secret: "nX7sV2fK9qLpR4mYtZ8wD3aHjU6eC1bNxT5rQvW2yP8kLmZ4s"
    issuer: "user-management-service"
    audience: "internal-services"
    expiration-minutes: 60
    email-verification-expiration-minutes: 15

app:
  email:
    from: ${APP_EMAIL_FROM:tech.tejabhanu03@proton.me}
    verify-base-url: ${APP_EMAIL_VERIFY_BASE_URL:http://localhost:8080/api/auth/verify-email}

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.use_management_system: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
