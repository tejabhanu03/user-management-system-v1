spring:
  application:
    name: user-management
  datasource:
    url: jdbc:mysql://localhost:3306/user_management
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password:
  main:
    allow-bean-definition-overriding: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  mvc:
    throw-exception-if-no-handler-found: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
    outOfOrder: false

security:
  jwt:
    # NOTE: Replace this with a strong value via environment-specific config before production use.
    secret: "nX7sV2fK9qLpR4mYtZ8wD3aHjU6eC1bNxT5rQvW2yP8kLmZ4s"
    issuer: "user-management-service"
    audience: "internal-services"
    expiration-minutes: 60

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.use_management_system: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

